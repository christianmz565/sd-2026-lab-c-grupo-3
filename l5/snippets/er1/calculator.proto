syntax = "proto3";

package src.main.proto.er1.v1;

option java_multiple_files = true;
option java_package = "com.lab05.er1.v1";
// START-SNIPPET,calculator-proto
service CalculatorService {
  rpc Sum (SumRequest) returns (SumResponse);
}

message SumRequest {
  int32 a = 1;
  int32 b = 2;
}

message SumResponse {
  int32 result = 1;
}
// END-SNIPPET
