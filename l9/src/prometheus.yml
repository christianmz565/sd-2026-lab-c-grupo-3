global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'orders'
    static_configs:
      - targets: ['orders:8001']

  - job_name: 'inventory'
    static_configs:
      - targets: ['inventory:8002']

  - job_name: 'billing'
    static_configs:
      - targets: ['billing:8003']

  - job_name: 'transport'
    static_configs:
      - targets: ['transport:8004']

  - job_name: 'notifications'
    static_configs:
      - targets: ['notifications:8005']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']