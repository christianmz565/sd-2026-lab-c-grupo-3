global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s

receivers:
  - name: 'default'
    # Configure email, slack, or webhook here
    # Example webhook:
    # webhook_configs:
    #   - url: 'http://your-webhook-endpoint:5001/alerts'

  - name: 'critical'
    # Configure critical alert notifications here
    # Example email:
    # email_configs:
    #   - to: 'admin@logimarket.pe'
    #     from: 'alertmanager@logimarket.pe'
    #     smarthost: 'smtp.logimarket.pe:587'
    #     auth_username: 'alertmanager@logimarket.pe'
    #     auth_password: 'password'
