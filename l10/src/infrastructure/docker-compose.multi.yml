name: sd-lab-db-multi

x-db-common: &db-common
  image: supabase/postgres:15.8.1.085
  networks:
    - inner-network
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
    interval: 5s
    timeout: 5s
    retries: 10
  environment:
    POSTGRES_HOST: /var/run/postgresql
    PGPORT: 5432
    POSTGRES_PORT: 5432
    PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    PGDATABASE: ${POSTGRES_DB:-postgres}
    POSTGRES_DB: ${POSTGRES_DB:-postgres}
    JWT_SECRET: ${JWT_SECRET:-supersecretkeythatisatleast32characterslong123456}
    JWT_EXP: ${JWT_EXPIRY:-3600}

x-studio-common: &studio-common
  image: supabase/studio:2025.12.17-sha-43f4f7f
  restart: unless-stopped
  networks:
    - inner-network
  healthcheck:
    test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/platform/profile').then((r) => {if (r.status !== 200) throw new Error(r.status)})"]
    timeout: 10s
    interval: 5s
    retries: 3

x-rest-common: &rest-common
  image: postgrest/postgrest:v14.1
  restart: unless-stopped
  networks:
    - inner-network
  command: ["postgrest"]

x-meta-common: &meta-common
  image: supabase/postgres-meta:v0.95.1
  restart: unless-stopped
  networks:
    - inner-network

x-standby-common: &standby-common
  command: ["/docker-entrypoint.sh", "postgres"]
  environment:
    <<: *db-common
    PRIMARY_HOST: lima-db
    PRIMARY_PORT: 5432
    REPLICATION_USER: postgres
    REPLICATION_SLOT: ${STANDBY_SLOT:-}
    APP_NAME: ${STANDBY_APP_NAME:-unknown}

services:
  # =========================================================================
  # LIMA - PRIMARY NODE
  # =========================================================================
  lima-db:
    <<: *db-common
    ports:
      - "5432:5432"
    volumes:
      - ./db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql:Z
      - ./db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql:Z
      - ./db/_supabase.sql:/docker-entrypoint-initdb.d/migrations/97-_supabase.sql:Z
      - ./db/pooler.sql:/docker-entrypoint-initdb.d/migrations/99-pooler.sql:Z
      - ./db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql:Z
      - ./db/logs.sql:/docker-entrypoint-initdb.d/migrations/99-logs.sql:Z
      - ./db/webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql:Z
      - ./db/replication.sql:/docker-entrypoint-initdb.d/init-scripts/98-replication.sql:Z
      - lima-db-data:/var/lib/postgresql/data
      - lima-db-config:/etc/postgresql-custom
      - ./db/config/postgresql.primary.conf:/etc/postgresql/postgresql.conf:ro,Z
      - ./db/config/pg_hba.conf:/etc/postgresql-custom/pg_hba.conf:ro,Z
      - ./db/config/supautils.conf:/etc/postgresql-custom/supautils.conf:ro,Z
      - ./db/config/wal-g.conf:/etc/postgresql-custom/wal-g.conf:ro,Z
      - ./db/config/extension-custom-scripts:/etc/postgresql-custom/extension-custom-scripts:ro,Z
      - ./scripts/init-primary.sh:/usr/local/bin/init-primary.sh:Z
    command: ["/bin/bash", "-c", "chmod +x /usr/local/bin/init-primary.sh && /usr/local/bin/init-primary.sh"]

  lima-studio:
    <<: *studio-common
    ports:
      - "3000:3000"
    depends_on:
      lima-db:
        condition: service_healthy
      lima-meta:
        condition: service_started
    environment:
      HOSTNAME: "::"
      STUDIO_PG_META_URL: http://lima-meta:8080
      PG_META_DB_HOST: lima-db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB:-postgres}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: lima-db
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PG_META_CRYPTO_KEY: ${PG_META_CRYPTO_KEY:-cryptokey123456789012345678901234567890}
      DEFAULT_ORGANIZATION_NAME: "FedEx Peru - Lima"
      DEFAULT_PROJECT_NAME: "Lima Hub"
