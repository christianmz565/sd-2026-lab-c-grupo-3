# =============================================================================
# STANDBY NODE CONFIGURATION
# Physical Streaming Replication
# =============================================================================

# Put PostgreSQL in standby mode
standby_mode = on

# Connection info to primary node (Lima)
primary_conninfo = 'host=lima-db port=5432 user=postgres password=postgres application_name=${APP_NAME}'

# Replication slot (set via primary_slot_name in postgresql.auto.conf after backup)

# Recovery settings
recovery_target_timeline = 'latest'

# Hot standby must be ON
hot_standby = on

# Network
listen_addresses = '*'

# WAL settings
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 1GB
