# =============================================================================
# STANDBY NODE CONFIGURATION BASE
# Physical Streaming Replication
# =============================================================================

# -----------------------------------------------------------------------------
# STANDBY SETTINGS
# -----------------------------------------------------------------------------
# Must be ON for standby nodes
standby_mode = on

hot_standby = on

# -----------------------------------------------------------------------------
# CONNECTION SETTINGS
# -----------------------------------------------------------------------------
listen_addresses = '*'

# -----------------------------------------------------------------------------
# RECOVERY SETTINGS
# -----------------------------------------------------------------------------
recovery_target_timeline = 'latest'

# Include node-specific standby configuration
include_if_exists = '/etc/postgresql-custom/standby.conf'
