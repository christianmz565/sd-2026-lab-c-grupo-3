# =============================================================================
# STANDBY CONFIGURATION - Bogotá
# Physical Streaming Replication
# =============================================================================

# Put PostgreSQL in standby mode (instead of using standby.signal file)
standby_mode = on

# Connection info to primary node (Lima)
primary_conninfo = 'host=lima-db port=5432 user=postgres password=postgres application_name=bogota'

# Replication slot for this standby
primary_slot_name = 'bogota_slot'

# Recovery settings
recovery_target_timeline = 'latest'

# Hot standby must be ON
hot_standby = on
