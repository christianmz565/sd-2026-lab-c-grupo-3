# pg_hba.conf - Host-Based Authentication
# Replication connections (first for performance)
host    replication     all             0.0.0.0/0               trust
host    replication     all             ::/0                    trust

# Local connections via Unix socket
local   all             postgres                                trust
local   all             all                                     trust

# Local connections via TCP/IP (IPv4 and IPv6)
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# Docker network - all connections from Docker subnet
host    all             postgres        172.16.0.0/12           trust
host    all             supabase_admin  172.16.0.0/12           trust
host    all             anon            172.16.0.0/12           trust
host    all             authenticated   172.16.0.0/12           trust
host    all             service_role    172.16.0.0/12           trust

# Replication connections from Docker
host    replication     postgres        172.16.0.0/12           trust
host    replication     postgres        172.22.0.0/16           trust

# Allow all remaining connections
host    all             all             0.0.0.0/0               trust
host    all             all             ::/0                    trust
