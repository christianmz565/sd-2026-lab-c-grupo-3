# =============================================================================
# PRIMARY NODE CONFIGURATION - Lima
# Physical Streaming Replication
# =============================================================================

# -----------------------------------------------------------------------------
# REPLICATION SETTINGS
# -----------------------------------------------------------------------------
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 1GB

# -----------------------------------------------------------------------------
# CONNECTION SETTINGS
# -----------------------------------------------------------------------------
listen_addresses = '*'
hot_standby = on

# -----------------------------------------------------------------------------
# WAL SETTINGS
# -----------------------------------------------------------------------------
wal_compression = on
wal_log_hints = on

# -----------------------------------------------------------------------------
# ARCHIVING (optional but recommended for Point-In-Time Recovery)
# -----------------------------------------------------------------------------
archive_mode = on
archive_command = '/bin/true'
archive_timeout = 300

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off
log_connections = on
log_disconnections = on
log_replication_commands = on
